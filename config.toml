# MAID — Medium-Agnostic AI Duo
# Copy this file and edit with your API keys.
# CLI flags override values set here.

[api]
# Anthropic Claude (set if using a claude-* model)
anthropic_api_key = ""

# Google Gemini — free tier available at https://aistudio.google.com
# Use with: model = "gemini-2.0-flash" in [session]
gemini_api_key = ""

# TTS providers — at least one required (or set tts_provider = "pyttsx3" for offline)
elevenlabs_api_key = ""
openai_api_key = ""

[session]
# Personality mode: "commentator", "coach", or "friend"
mode = "commentator"

# Seconds between each analysis cycle.
# Default is 15s — the Gemini free tier allows 5 requests/minute (1 per 12s),
# and silent frames still consume quota, so 15s gives comfortable headroom.
# Lower values are fine on paid tiers. Use --interval to override at runtime.
capture_interval_seconds = 15.0

# AI model to use.
# Claude: "claude-sonnet-4-6", "claude-opus-4-6"
# Gemini (free tier): "gemini-2.0-flash"
model = "gemini-2.0-flash"

# Max tokens in each AI response (keep low — these are spoken aloud).
max_tokens = 150

# If true, the capture interval starts after TTS finishes rather than at the
# top of each iteration. Ensures a full gap after every line of commentary.
wait_for_tts = false

[capture]
# Which monitor to capture (0 = primary).
monitor_index = 0

# Capture audio from microphone as a speaking hint.
audio_enabled = false

[tts]
# TTS provider: "elevenlabs", "openai", or "pyttsx3" (offline fallback)
provider = "elevenlabs"

# ElevenLabs voice ID. Default is "Rachel".
elevenlabs_voice_id = "EXAVITQu4vr4xnSDxMaL"

# OpenAI TTS voice: alloy, echo, fable, onyx, nova, shimmer
openai_voice = "nova"

# macOS voice for pyttsx3 provider (macOS only). Leave empty for system default.
# Run `say -v '?'` in Terminal to list all installed voices.
# Examples: "Bad News", "Zarvox", "Fred", "Samantha", "Trinoids"
macos_voice = ""
